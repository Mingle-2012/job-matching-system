services:
  mysql:
    image: mysql:8.4
    container_name: job-matching-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: job_matching
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  neo4j:
    image: neo4j:5.26
    container_name: job-matching-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: job-matching-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7.4
    container_name: job-matching-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-matching-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
      - neo4j
      - qdrant
      - redis
    volumes:
      - ../dataset:/dataset
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  neo4j_data:
  qdrant_data:
  redis_data:
